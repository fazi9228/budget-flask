      window._vendorList=window._vendorList||[];
      window._vendorList.push({id:d.id,name:d.name,country:d.country});
      vendorVal = d.name;
    }catch(e){
      vendorVal = newName; // Use name even if save fails
    }
  }
  if(vendorVal==='__new__') vendorVal='';

  // Same auto-add pattern for Finance Category if user typed but didn't click Add
  let fcVal = gv('m-fc');
  const fcNewInput = g('m-fc-input');
  if((!fcVal || fcVal==='__new__') && fcNewInput && fcNewInput.value.trim()){
    const newName = fcNewInput.value.trim();
    try{
      const d = await api('/api/categories',{method:'POST',body:JSON.stringify({type:'finance',value:newName})});
      FIN_CATS.push(d.value);
      fcVal = d.value;
    }catch(e){
      // If server says "Exists" treat as success; otherwise keep the typed value
      fcVal = newName;
    }
  }
  if(fcVal==='__new__') fcVal='';
  if(fcVal){ const fcEl=g('m-fc'); if(fcEl) fcEl.value = fcVal; }

  // Same for Marketing Category
  let mcVal = gv('m-mc');
  const mcNewInput = g('m-mc-input');
  if((!mcVal || mcVal==='__new__') && mcNewInput && mcNewInput.value.trim()){
    const newName = mcNewInput.value.trim();
    try{
      const d = await api('/api/categories',{method:'POST',body:JSON.stringify({type:'marketing',value:newName})});
      MKT_CATS.push(d.value);
      mcVal = d.value;
    }catch(e){
      mcVal = newName;
    }
  }
  if(mcVal==='__new__') mcVal='';
  if(mcVal){ const mcEl=g('m-mc'); if(mcEl) mcEl.value = mcVal; }

  const req={mo:'m-mo',bu:'m-bu',pln:'m-pln'};  // fc/mc validated separately below
  const chEl=g('m-ch');
  if(chEl&&budgetData.channels.length>0) req.ch='m-ch';
  let ok=true;
  Object.values(req).forEach(id=>{const el=g(id),p=el?.closest('.field');if(!el?.value?.trim()){p?.classList.add('has-err');ok=false;}else p?.classList.remove('has-err');});
  // Validate finance/marketing categories (might be set from newly-added values)
  const fcField=g('m-fc')?.closest('.field');
  if(!fcVal){fcField?.classList.add('has-err');ok=false;}else{fcField?.classList.remove('has-err');}
  const mcField=g('m-mc')?.closest('.field');
  if(!mcVal){mcField?.classList.add('has-err');ok=false;}else{mcField?.classList.remove('has-err');}
  // Validate vendor separately
  const venField=g('m-ven')?.closest('.field');
  if(!vendorVal){venField?.classList.add('has-err');ok=false;}else{venField?.classList.remove('has-err');}
  if(!ok){toast('Fill required fields','err');return;}

  let channelId='',channelName='',activityId='',activityName='';
  if(chEl&&chEl.value){const ch=budgetData.channels.find(c=>c.id===chEl.value);channelId=chEl.value;channelName=ch?.name||'';}
  const actEl=g('m-act');
  if(actEl&&actEl.value){activityId=actEl.value;activityName=actEl.options[actEl.selectedIndex]?.text||'';}

  const mo=gv('m-mo');
  const mObj=MONTHS.find(x=>x.v===mo);
  const payload={
    country, quarter:mObj?.q||quarter, month:mo,
    channel_id:channelId, channel_name:channelName,
    activity_id:activityId, activity_name:activityName,
    bu:g('m-bu').value, finance_cat:fcVal, marketing_cat:mcVal,
    description:gv('m-desc'),
    planned:parseFloat(gv('m-pln'))||0,
    confirmed:parseFloat(gv('m-con'))||0,
    actual:parseFloat(gv('m-act2'))||0,
    jira:gv('m-jira'), vendor:vendorVal, notes:g('m-notes')?.value?.trim()||'',
    approved:approveState,
    invoice_names:[...existInvNames,...pendingInvs.map(i=>i.name)],
    invoice_data:[...pendingInvs.map(i=>i.dataUrl)],
  };
  try{
    if(editEntryId){
      const idx=entries.findIndex(e=>e.id===editEntryId);
      if(idx>=0) entries[idx]={...entries[idx],...payload};
      _cache.entries=entries;
      closeEM();toast('Updated ✓','ok');render();
      api(`/api/entries/${editEntryId}`,{method:'PUT',body:JSON.stringify(payload)}).catch(e=>toast('Sync error','err'));
    } else {
      const d=await api('/api/entries',{method:'POST',body:JSON.stringify(payload)});
      entries.push({...payload,id:d.id,entered_by:USER,updated_at:new Date().toISOString(),invoice_names:payload.invoice_names});
      _cache.entries=entries;
      closeEM();toast('Saved ✓','ok');render();
    }
  }catch(e){toast(e.message,'err');}
}

async function saveAnnualBudget(){
  const annual=parseFloat(g('cfg-annual')?.value)||0;
  if(!annual){toast('Enter an annual budget','err');return;}
  const perQ=Math.round(annual/4);
  toast('Setting '+country+' budget to $'+fmt(perQ)+' per quarter...','info');
  try{
    for(const q of QS) await api('/api/budget/'+country+'/'+q,{method:'POST',body:JSON.stringify({total:perQ})});
    budgetData.total=perQ;_cache.budget=budgetData;g('cfg-tot').value=perQ;
    toast(country+' budget set: $'+fmt(perQ)+' × 4 quarters = $'+fmt(annual),'ok');
  }catch(e){toast(e.message||'Failed','err');}
}

async function uploadBudgets(inp){
  if(!inp.files.length) return;
  const fd=new FormData(); fd.append('file',inp.files[0]);
  const res=g('cfg-bud-result');
  if(res) res.innerHTML='<span style="color:var(--in)">Uploading...</span>';
  try{
    const r=await fetch('/api/import/budgets',{method:'POST',body:fd}); const d=await r.json();
    if(!r.ok) throw new Error(d.error||'Upload failed');
    if(res) res.innerHTML='<span style="color:var(--su)">'+d.saved+' budgets saved'+(d.skipped>0?' · '+d.skipped+' skipped':'')+'</span>';
    invalidateCache(); toast(d.saved+' country budgets imported','ok');
    setTimeout(function(){_cache.cacheKey=null;renderCfg()},1200);
  }catch(e){if(res) res.innerHTML='<span style="color:var(--da)">Error: '+esc(e.message)+'</span>';toast(e.message||'Upload failed','err');}
  inp.value='';
}

async function uploadChannels(inp){
  if(!inp.files.length) return;
  const fd=new FormData(); fd.append('file',inp.files[0]);
  const res=g('cfg-ch-result');
  if(res) res.innerHTML='<span style="color:var(--in)">Uploading...</span>';
  try{
    const r=await fetch('/api/import/channels',{method:'POST',body:fd}); const d=await r.json();
    if(!r.ok) throw new Error(d.error||'Upload failed');
    var msg=d.saved+' channels saved';
    if(d.skipped_dups>0) msg+=' · '+d.skipped_dups+' duplicates';
    if(res) res.innerHTML='<span style="color:var(--su)">'+msg+'</span>';
    invalidateCache(); toast(msg,'ok');
    setTimeout(function(){_cache.cacheKey=null;renderCfg()},1200);
  }catch(e){if(res) res.innerHTML='<span style="color:var(--da)">Error: '+esc(e.message)+'</span>';toast(e.message||'Upload failed','err');}
  inp.value='';
}

      });
      inner+=`</div><div style="display:flex;gap:4px">
        <input type="text" id="new-cat-${type}" placeholder="Add new..." style="flex:1;padding:5px 8px;font-size:11px;border:1px solid var(--b);border-radius:4px">
        <button class="btn btn-p btn-xs" onclick="addCat('${type}')">+</button>
      </div>`;
      el.innerHTML=inner;
    });
  }catch(e){
    ['bu','finance','marketing'].forEach(type=>{
      const el=g(`cat-${type}`);
      if(el) el.innerHTML=`<div style="color:var(--t3);font-size:11px">Failed to load</div>`;
    });
  }
}

async function addCat(type){
  const inp=g(`new-cat-${type}`); const value=inp?.value?.trim();
  if(!value){toast('Enter a value','err');return;}
  try{await api('/api/categories',{method:'POST',body:JSON.stringify({type,value})});inp.value='';toast('Added ✓','ok');loadCategoryEditor();loadCategories();}catch(e){toast(e.message||'Failed','err');}
}

async function deleteCat(id,type){
  if(!confirm('Delete this category?')) return;
  try{await api(`/api/categories/${id}`,{method:'DELETE'});toast('Deleted','info');loadCategoryEditor();loadCategories();}catch(e){toast(e.message||'Failed','err');}
}

// ===================================================================
// UPLOAD HANDLERS (Planned + Line Items)
// ===================================================================
async function uploadPlanned(inputId, outId){
  inputId = inputId || 'plannedUploadFile';
  outId = outId || 'plannedUploadResult';
  const fileEl = g(inputId), outEl = g(outId);
  if(!fileEl || !fileEl.files.length){toast('Select a file first','err');return;}
  const fd = new FormData(); fd.append('file', fileEl.files[0]);
  if(outEl) outEl.innerHTML = '<div class="upload-result">Uploading...</div>';
  try{
    const res = await fetch('/api/upload/planned',{method:'POST',body:fd});
    const j = await res.json();
    if(!res.ok || j.error){
      if(outEl) outEl.innerHTML = '<div class="upload-result err">Error: '+esc(j.error||'Upload failed')+'</div>';
      return;
    }
    renderUploadResult(outEl, j);
    fileEl.value = '';
    invalidateCache();
    toast('Uploaded '+j.saved+' rows','ok');
  }catch(e){
    if(outEl) outEl.innerHTML = '<div class="upload-result err">Network error: '+esc(e.message)+'</div>';
  }
}

function renderUploadResult(el, j){
  if(!el) return;
  let html = '<div class="upload-result ok">&#x2705; Uploaded. Saved: <b>'+j.saved+'</b>';
  if(j.overwrote !== undefined) html += ' ('+j.overwrote+' overwrote, '+j.created+' new)';
  if(j.channels_created) html += ', channels created: <b>'+j.channels_created+'</b>';
  if(j.activities_created) html += ', activities created: <b>'+j.activities_created+'</b>';
  if(j.rejected_count) html += ', rejected: <b style="color:var(--da)">'+j.rejected_count+'</b>';
  html += '</div>';

  if(j.approved_overwrites && j.approved_overwrites.length){
    html += '<div class="upload-result err" style="margin-top:6px">&#x26A0;&#xFE0F; <b>'+j.approved_overwrites.length+' approved</b> row(s) were overwritten:<div class="detail">';
    j.approved_overwrites.slice(0,20).forEach(r=>{
      html += 'row '+r.row+': '+esc(r.country)+'/'+esc(r.month)+' '+esc(r.channel||'')+'/'+esc(r.activity||'')+' &mdash; '+esc(r.description||r.vendor||'(no desc)')+'<br>';
    });
    if(j.approved_overwrites.length > 20) html += '... and '+(j.approved_overwrites.length-20)+' more<br>';
    html += '</div></div>';
  }

  if(j.rejected && j.rejected.length){
    html += '<div class="upload-result err" style="margin-top:6px"><details><summary>Rejected rows ('+j.rejected.length+')</summary><div class="detail">';
    j.rejected.slice(0,50).forEach(r=>{ html += 'row '+r.row+': '+esc(r.reason||'')+'<br>'; });
    if(j.rejected.length > 50) html += '... and '+(j.rejected.length-50)+' more<br>';
    html += '</div></details></div>';
  }
  el.innerHTML = html;
}

// ===================================================================
// BULK DELETE (admin only) - checkbox-based selection
// ===================================================================
async function bulkDeletePreview(){
  const country = gv('bdCountry');
  const quarter = gv('bdQuarter');
  const channel = gv('bdChannel');
  const activity = gv('bdActivity');
  const month = gv('bdMonth');
  const outEl = g('bdPreviewOut');
  if(!country || !quarter){toast('Country and quarter required','err');return;}
  if(outEl) outEl.innerHTML = '<div class="upload-result">Loading preview...</div>';
  try{
    const res = await fetch('/api/bulk_delete/preview',{
      method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({country, quarter, channel, activity, month})
    });
    const j = await res.json();
    if(!res.ok || j.error){
      if(outEl) outEl.innerHTML = '<div class="upload-result err">Error: '+esc(j.error||'Failed')+'</div>';
      return;
    }
    if(j.count === 0){
      if(outEl) outEl.innerHTML = '<div class="upload-result ok">No matching entries.</div>';
      return;
    }

    // Stash the sample rows so we can compute totals on selection changes
    window._bdSample = j.sample;

    let html = '<div class="upload-result" style="margin-top:10px;background:var(--wab);color:var(--wa)">Found <b>'+j.count+'</b> entries. Total planned: <b>$'+fmt(j.total_planned)+'</b>, total actual: <b>$'+fmt(j.total_actual)+'</b>.';
    if(j.truncated) html += ' <span style="color:var(--da)"><b>Note:</b> showing first 500 — narrow your filter to see the rest.</span>';
    html += '</div>';

    html += '<div style="display:flex;gap:8px;align-items:center;margin:10px 0 6px;flex-wrap:wrap">';
    html += '<button class="btn btn-g btn-xs" type="button" onclick="bdSelectAll(true)">&#x2713; Select all</button>';
    html += '<button class="btn btn-g btn-xs" type="button" onclick="bdSelectAll(false)">&#x2715; Deselect all</button>';
    html += '<span style="font-size:11px;color:var(--t3);margin-left:8px"><span id="bdSelCount">0</span> of '+j.sample.length+' selected &middot; $<span id="bdSelPln">0</span> planned / $<span id="bdSelAct">0</span> actual</span>';
    html += '</div>';

    html += '<div class="preview-sample"><table>';
    html += '<thead><tr>';
    html += '<th style="width:28px"><input type="checkbox" id="bdChkHead" onclick="bdSelectAll(this.checked)"></th>';
    html += '<th>ID</th><th>Month</th><th>Channel</th><th>Activity</th><th>Vendor</th><th>Desc</th>';
    html += '<th style="text-align:right">Pln</th><th style="text-align:right">Act</th>';
    html += '</tr></thead><tbody>';
    j.sample.forEach((s, i)=>{
      html += '<tr>';
      html += '<td><input type="checkbox" class="bd-row-chk" data-id="'+esc(s.id)+'" data-pln="'+s.planned+'" data-act="'+s.actual+'" onclick="bdUpdateSelection()"></td>';
      html += '<td class="mono" style="font-size:10px">'+esc(s.id)+'</td>';
      html += '<td>'+esc(s.month)+'</td>';
      html += '<td>'+esc(s.channel)+'</td>';
      html += '<td>'+esc(s.activity||'')+'</td>';
      html += '<td>'+esc(s.vendor||'')+'</td>';
      html += '<td>'+esc((s.description||'').substring(0,40))+'</td>';
      html += '<td class="mono" style="text-align:right">'+(s.planned?'$'+fmt(s.planned):'')+'</td>';
      html += '<td class="mono" style="text-align:right">'+(s.actual?'$'+fmt(s.actual):'')+'</td>';
      html += '</tr>';
    });
    html += '</tbody></table></div>';

    html += '<div class="confirm-box" style="margin-top:12px">';
    html += '<div style="font-size:12px;color:var(--t2);margin-bottom:4px">To permanently delete the <b><span id="bdSelCount2">0</span></b> selected entries, type:</div>';
    html += '<div id="bdPhrase" style="margin:4px 0;padding:6px 10px;background:var(--s2);border-radius:4px;display:inline-block;font-family:\'DM Mono\',monospace;font-size:12px">DELETE 0 SELECTED</div>';
    html += '<input type="text" id="bdConfirmation" style="width:100%;margin-top:6px" placeholder="Type the phrase above exactly">';
    html += '<button class="btn btn-d btn-sm" style="margin-top:8px" onclick="bulkDeleteCommit()" id="bdCommitBtn" disabled>&#x26A0;&#xFE0F; Commit Delete</button>';
    html += '</div>';

    if(outEl) outEl.innerHTML = html;
    bdUpdateSelection();  // initialize counters at 0
  }catch(e){
    if(outEl) outEl.innerHTML = '<div class="upload-result err">Network error: '+esc(e.message)+'</div>';
  }
}

function bdSelectAll(checked){
  document.querySelectorAll('.bd-row-chk').forEach(c=>{c.checked=!!checked});
  const head=g('bdChkHead'); if(head) head.checked=!!checked;
  bdUpdateSelection();
}

function bdUpdateSelection(){
  const checks=document.querySelectorAll('.bd-row-chk');
  const selected=[...checks].filter(c=>c.checked);
  const n=selected.length;
  let pln=0, act=0;
  selected.forEach(c=>{
    pln += parseFloat(c.dataset.pln||0);
    act += parseFloat(c.dataset.act||0);
  });
  const c1=g('bdSelCount'); if(c1) c1.textContent=n;
  const c2=g('bdSelCount2'); if(c2) c2.textContent=n;
  const p=g('bdSelPln'); if(p) p.textContent=fmt(pln);
  const a=g('bdSelAct'); if(a) a.textContent=fmt(act);
  const phrase=g('bdPhrase'); if(phrase) phrase.textContent='DELETE '+n+' SELECTED';
  const btn=g('bdCommitBtn'); if(btn) btn.disabled=(n===0);
  // Sync the header checkbox state
  const head=g('bdChkHead');
  if(head){
    if(n===0) head.checked=false;
    else if(n===checks.length) head.checked=true;
    else head.indeterminate=true;
  }
}

async function bulkDeleteCommit(){
  const confirmation = gv('bdConfirmation');
  const ids = [...document.querySelectorAll('.bd-row-chk:checked')].map(c=>c.dataset.id);
  if(!ids.length){toast('Tick at least one row','err');return;}
  if(!confirmation){toast('Type the confirmation phrase','err');return;}
  const outEl = g('bdPreviewOut');
  try{
    const res = await fetch('/api/bulk_delete/commit',{
      method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({ids, confirmation})
    });
    const j = await res.json();
    if(!res.ok || j.error){
      if(outEl) outEl.innerHTML = '<div class="upload-result err">Error: '+esc(j.error||'Failed')+'</div>';
      return;
    }
    let msg='<div class="upload-result ok">&#x2705; Deleted '+j.deleted+' of '+j.requested+' entries.';
    if(j.not_found>0) msg += ' ('+j.not_found+' not found - possibly already deleted.)';
    msg += '</div>';
    if(outEl) outEl.innerHTML = msg;
    toast('Deleted '+j.deleted+' entries','ok');
    invalidateCache();
    setTimeout(()=>renderCfg(), 1500);
  }catch(e){
    if(outEl) outEl.innerHTML = '<div class="upload-result err">Network error: '+esc(e.message)+'</div>';
  }
}

document.addEventListener('keydown',e=>{if(e.key==='Escape'){closeEM();closeCM();closeAM();closeDM();}});

  await loadCategories();
  initNav();
  renderDash();
  api('/api/vendors').then(v=>{window._vendorList=v;}).catch(()=>{window._vendorList=[];});
}
boot();
